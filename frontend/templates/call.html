<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceIQ — Transcript</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/7.8.7/wavesurfer.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #07090F;
    --surface:   #0D1117;
    --card:      #0F1420;
    --card2:     #161B27;
    --border:    #1E2535;
    --border2:   #2A3347;
    --agent:     #4F8EF7;
    --agent-dim: rgba(79,142,247,0.12);
    --caller:    #F5A623;
    --caller-dim:rgba(245,166,35,0.12);
    --green:     #22C55E;
    --red:       #EF4444;
    --text:      #E8ECF4;
    --text2:     #B0BAD0;
    --muted:     #6B7A99;
    --muted2:    #3D4A61;
  }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; }

  /* NAVBAR */
  nav {
    position:sticky; top:0; z-index:100;
    background:rgba(7,9,15,0.92); backdrop-filter:blur(16px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px; padding:0 24px; height:56px;
  }
  .nav-back { background:none; border:1px solid var(--border); border-radius:7px; padding:6px 12px; color:var(--muted); font-family:inherit; font-size:12px; cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
  .nav-back:hover { border-color:var(--border2); color:var(--text); }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:16px; }
  .nav-logo span { color:var(--agent); }
  .nav-title { font-size:12px; color:var(--muted); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-left:4px; }
  .nav-actions { display:flex; gap:8px; margin-left:auto; flex-shrink:0; }
  .btn-download {
    background:linear-gradient(135deg,var(--agent),#2563EB);
    border:none; border-radius:7px; padding:7px 16px;
    color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
    cursor:pointer; transition:opacity 0.2s; display:flex; align-items:center; gap:6px;
  }
  .btn-download:hover { opacity:0.9; }
  .btn-ghost-sm { background:none; border:1px solid var(--border); border-radius:7px; padding:7px 12px; color:var(--muted); font-family:inherit; font-size:12px; cursor:pointer; }
  .btn-ghost-sm:hover { border-color:var(--agent); color:var(--agent); }

  /* MAIN LAYOUT */
  .main { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 56px); overflow:hidden; }

  /* LEFT SIDEBAR */
  .sidebar {
    background:var(--surface); border-right:1px solid var(--border);
    overflow-y:auto; padding:20px 16px;
    display:flex; flex-direction:column; gap:20px;
  }
  .sidebar-section {}
  .section-title {
    font-size:10px; font-weight:500; letter-spacing:0.12em;
    text-transform:uppercase; color:var(--muted); margin-bottom:12px;
  }

  .info-grid { display:flex; flex-direction:column; gap:8px; }
  .info-row {
    display:flex; flex-direction:column; gap:2px;
    background:var(--card); border:1px solid var(--border);
    border-radius:8px; padding:10px 12px;
  }
  .info-label { font-size:10px; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
  .info-value { font-size:12px; color:var(--text); word-break:break-all; }
  .info-value.agent  { color:var(--agent); }
  .info-value.caller { color:var(--caller); }

  /* Speaker legend */
  .speaker-card {
    background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px;
    display:flex; align-items:center; gap:10px;
  }
  .speaker-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .speaker-dot.agent  { background:var(--agent); box-shadow:0 0 8px var(--agent); }
  .speaker-dot.caller { background:var(--caller); box-shadow:0 0 8px var(--caller); }
  .speaker-info {}
  .speaker-name { font-size:13px; font-weight:500; }
  .speaker-name.agent  { color:var(--agent); }
  .speaker-name.caller { color:var(--caller); }
  .speaker-stat { font-size:10px; color:var(--muted); margin-top:2px; }

  /* Talk ratio bar */
  .ratio-bar-wrap { margin-top:6px; }
  .ratio-bar {
    height:6px; border-radius:3px; overflow:hidden;
    display:flex; background:var(--border); margin:6px 0 4px;
  }
  .ratio-agent  { background:var(--agent); transition:width 0.5s; }
  .ratio-caller { background:var(--caller); transition:width 0.5s; }
  .ratio-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); }

  /* Search */
  .search-box {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:9px 12px; color:var(--text); font-family:inherit; font-size:12px;
    outline:none; width:100%; transition:border-color 0.2s;
  }
  .search-box:focus { border-color:var(--agent); }
  .search-box::placeholder { color:var(--muted2); }
  .search-count { font-size:10px; color:var(--muted); margin-top:5px; }

  /* RIGHT — TRANSCRIPT + PLAYER */
  .content { display:flex; flex-direction:column; overflow:hidden; }

  /* PLAYER */
  .player-wrap {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:16px 24px; flex-shrink:0;
  }
  .dual-waves { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
  .wave-row { display:flex; align-items:center; gap:10px; }
  .wave-label { font-size:10px; width:40px; flex-shrink:0; letter-spacing:0.06em; text-transform:uppercase; }
  .wave-label.agent  { color:var(--agent); }
  .wave-label.caller { color:var(--caller); }
  .wave-container { flex:1; border-radius:4px; overflow:hidden; background:var(--bg); }
  #wave-agent  { height:44px; }
  #wave-caller { height:44px; }

  .player-controls { display:flex; align-items:center; gap:12px; }
  .play-btn {
    width:36px; height:36px; border-radius:50%;
    background:linear-gradient(135deg,var(--agent),#2563EB);
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:14px; transition:transform 0.1s; flex-shrink:0;
  }
  .play-btn:active { transform:scale(0.95); }
  .player-time { font-size:12px; color:var(--muted); flex-shrink:0; min-width:80px; }
  .speed-btns { display:flex; gap:4px; }
  .speed-btn { background:var(--card); border:1px solid var(--border); border-radius:5px; padding:4px 8px; color:var(--muted); font-family:inherit; font-size:10px; cursor:pointer; transition:all 0.2s; }
  .speed-btn.active { border-color:var(--agent); color:var(--agent); }
  .player-actions { display:flex; gap:6px; margin-left:auto; }

  /* TRANSCRIPT */
  .transcript-wrap { flex:1; overflow-y:auto; padding:24px; }
  .transcript-inner { max-width:820px; margin:0 auto; }

  /* Automated intro block (IVR / pre-recording message) */
  .ivr-block {
    background:var(--card2); border:1px solid var(--border);
    border-radius:8px; padding:14px 16px; margin-bottom:20px;
    font-size:12px; color:var(--muted); font-style:italic;
    display:flex; gap:10px; align-items:flex-start;
  }
  .ivr-icon { font-size:16px; flex-shrink:0; }

  /* Segment group */
  .seg-group {
    display:flex; gap:12px; margin-bottom:4px;
    padding:8px; border-radius:10px; cursor:pointer;
    transition:background 0.15s;
    scroll-margin-top: 80px;
  }
  .seg-group:hover { background:rgba(255,255,255,0.03); }
  .seg-group.active { background:rgba(79,142,247,0.07); }
  .seg-group.highlight { background:rgba(234,179,8,0.08); }

  .seg-avatar {
    width:28px; height:28px; border-radius:50%; flex-shrink:0; margin-top:2px;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
  }
  .seg-avatar.agent  { background:var(--agent-dim); color:var(--agent); border:1px solid rgba(79,142,247,0.25); }
  .seg-avatar.caller { background:var(--caller-dim); color:var(--caller); border:1px solid rgba(245,166,35,0.25); }

  .seg-body { flex:1; min-width:0; }
  .seg-header { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .seg-role { font-size:11px; font-weight:600; letter-spacing:0.04em; }
  .seg-role.agent  { color:var(--agent); }
  .seg-role.caller { color:var(--caller); }
  .seg-time { font-size:10px; color:var(--muted2); }
  .seg-text {
    font-size:13px; line-height:1.7; color:var(--text2);
    transition:color 0.2s;
  }
  .seg-group.active .seg-text { color:var(--text); }
  .seg-text mark { background:rgba(234,179,8,0.25); color:var(--text); border-radius:2px; padding:0 1px; }

  /* Error state */
  .error-banner {
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
    border-radius:8px; padding:16px; text-align:center; color:var(--red);
    margin:40px auto; max-width:400px;
  }

  /* Loading */
  .loading-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; gap:12px; color:var(--muted); }
  .spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--agent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<nav>
  <a href="/dashboard.html" class="nav-back">← Dashboard</a>
  <span class="nav-logo">Voice<span>IQ</span></span>
  <span class="nav-title" id="nav-title">Loading...</span>
  <div class="nav-actions">
    <button class="btn-ghost-sm" onclick="copyTranscript()">📋 Copy</button>
    <button class="btn-download" id="dl-btn" onclick="downloadTxt()" disabled>
      ⬇ Download TXT
    </button>
  </div>
</nav>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="section-title">Call Info</div>
      <div class="info-grid" id="call-info">
        <div class="loading-wrap"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Speakers</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="speaker-card">
          <div class="speaker-dot agent"></div>
          <div class="speaker-info">
            <div class="speaker-name agent">Agent</div>
            <div class="speaker-stat" id="agent-stat">-- words · -- turns</div>
          </div>
        </div>
        <div class="speaker-card">
          <div class="speaker-dot caller"></div>
          <div class="speaker-info">
            <div class="speaker-name caller">Caller</div>
            <div class="speaker-stat" id="caller-stat">-- words · -- turns</div>
          </div>
        </div>
        <div class="ratio-bar-wrap">
          <div class="ratio-bar">
            <div class="ratio-agent" id="ratio-agent" style="width:50%"></div>
            <div class="ratio-caller" id="ratio-caller" style="width:50%"></div>
          </div>
          <div class="ratio-labels">
            <span>Agent <span id="ratio-agent-pct">50%</span></span>
            <span>Caller <span id="ratio-caller-pct">50%</span></span>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Search</div>
      <input class="search-box" type="text" id="search-input"
        placeholder="Search transcript..." oninput="doSearch(this.value)">
      <div class="search-count" id="search-count"></div>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- PLAYER -->
    <div class="player-wrap" id="player-wrap" style="display:none">
      <div class="dual-waves">
        <div class="wave-row">
          <span class="wave-label agent">Agent</span>
          <div class="wave-container"><div id="wave-agent"></div></div>
        </div>
        <div class="wave-row">
          <span class="wave-label caller">Caller</span>
          <div class="wave-container"><div id="wave-caller"></div></div>
        </div>
      </div>
      <div class="player-controls">
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <span class="player-time" id="player-time">0:00 / 0:00</span>
        <div class="speed-btns">
          <button class="speed-btn active" onclick="setSpeed(1)">1×</button>
          <button class="speed-btn" onclick="setSpeed(1.25)">1.25×</button>
          <button class="speed-btn" onclick="setSpeed(1.5)">1.5×</button>
          <button class="speed-btn" onclick="setSpeed(2)">2×</button>
        </div>
        <div class="player-actions" style="margin-left:auto">
          <button class="btn-ghost-sm" onclick="skipBackward()">« 10s</button>
          <button class="btn-ghost-sm" onclick="skipForward()">10s »</button>
        </div>
      </div>
    </div>

    <!-- TRANSCRIPT -->
    <div class="transcript-wrap" id="transcript-wrap">
      <div class="transcript-inner">
        <div class="loading-wrap">
          <div class="spinner"></div>
          <span>Loading transcript...</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = window.API_BASE || '';
const token = localStorage.getItem('voiceiq_token');
if (!token) window.location.href = '/index.html';
const headers = () => ({ Authorization: `Bearer ${token}` });

// Get call ID from URL
const params = new URLSearchParams(location.search);
const callId = params.get('id');
if (!callId) window.location.href = '/dashboard.html';

let callData = null;
let ws_agent = null, ws_caller = null;
let isPlaying = false;
let searchMatches = [];
let searchIdx = 0;
let activeSegIdx = -1;

// ── WAVESURFER ─────────────────────────────────────────────────────────────

let wsAgent = null, wsCaller = null;
let wavesReady = { agent: false, caller: false };

function initWaveforms(callId) {
  const commonOpts = {
    height: 44,
    waveColor: '#1E2535',
    progressColor: '#4F8EF7',
    cursorColor: 'transparent',
    barWidth: 2,
    barGap: 1,
    barRadius: 1,
    interact: true,
    normalize: true,
  };

  wsAgent = WaveSurfer.create({
    ...commonOpts,
    container: '#wave-agent',
    waveColor: '#1E3461',
    progressColor: '#4F8EF7',
  });
  wsCaller = WaveSurfer.create({
    ...commonOpts,
    container: '#wave-caller',
    waveColor: '#3D2A08',
    progressColor: '#F5A623',
  });

  wsAgent.load(`${API}/audio/${callId}_ch0.wav`);
  wsCaller.load(`${API}/audio/${callId}_ch1.wav`);

  let agentDur = 0;

  wsAgent.on('ready', () => {
    wavesReady.agent = true;
    agentDur = wsAgent.getDuration();
    updateTime(0, agentDur);
    if (wavesReady.caller) document.getElementById('player-wrap').style.display = 'block';
  });
  wsCaller.on('ready', () => {
    wavesReady.caller = true;
    if (wavesReady.agent) document.getElementById('player-wrap').style.display = 'block';
  });

  wsAgent.on('timeupdate', (t) => {
    // Sync caller waveform position
    const dur = wsAgent.getDuration();
    if (dur) wsCaller.seekTo(t / dur);
    updateTime(t, dur);
    highlightActiveSegment(t);
  });

  wsAgent.on('finish', () => {
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
  });

  // Click on caller waveform → seek agent
  wsCaller.on('interaction', (t) => {
    const dur = wsCaller.getDuration();
    if (dur) wsAgent.seekTo(t / dur);
  });
}

function togglePlay() {
  if (!wsAgent) return;
  if (isPlaying) {
    wsAgent.pause(); wsCaller.pause();
    document.getElementById('play-btn').textContent = '▶';
  } else {
    wsAgent.play(); wsCaller.play();
    document.getElementById('play-btn').textContent = '⏸';
  }
  isPlaying = !isPlaying;
}

function setSpeed(s) {
  if (wsAgent) { wsAgent.setPlaybackRate(s); wsCaller.setPlaybackRate(s); }
  document.querySelectorAll('.speed-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === s+'×')
  );
}

function skipForward()  { if (wsAgent) wsAgent.skip(10); }
function skipBackward() { if (wsAgent) wsAgent.skip(-10); }

function updateTime(cur, dur) {
  const f = s => { const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m}:${String(sec).padStart(2,'0')}`; };
  document.getElementById('player-time').textContent = `${f(cur)} / ${f(dur||0)}`;
}

function seekTo(sec) {
  if (!wsAgent) return;
  const dur = wsAgent.getDuration();
  if (dur) wsAgent.seekTo(sec / dur);
  if (!isPlaying) { wsAgent.play(); wsCaller.play(); isPlaying=true; document.getElementById('play-btn').textContent='⏸'; }
}

// ── LOAD CALL ──────────────────────────────────────────────────────────────

async function loadCall() {
  try {
    const res = await fetch(`${API}/api/calls/${callId}`, { headers: headers() });
    if (!res.ok) throw new Error('Call not found');
    callData = await res.json();
  } catch(e) {
    document.querySelector('.transcript-inner').innerHTML =
      `<div class="error-banner">⚠️ ${e.message}</div>`;
    return;
  }

  document.getElementById('nav-title').textContent = callData.filename;
  document.title = `VoiceIQ — ${callData.filename}`;

  renderCallInfo();
  renderSpeakerStats();
  renderTranscript();

  if (callData.status === 'done') {
    document.getElementById('dl-btn').disabled = false;
    initWaveforms(callId);
  }
}

function formatTime(sec) {
  if (!sec) return '--';
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function formatDate(dt) {
  if (!dt) return '--';
  return new Date(dt + 'Z').toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

function renderCallInfo() {
  const c = callData;
  document.getElementById('call-info').innerHTML = `
    <div class="info-row">
      <span class="info-label">Duration</span>
      <span class="info-value">${formatTime(c.duration_sec)}</span>
    </div>
    ${c.call_date ? `
    <div class="info-row">
      <span class="info-label">Date</span>
      <span class="info-value">${formatDate(c.call_date)}</span>
    </div>` : ''}
    ${c.publisher_id ? `
    <div class="info-row">
      <span class="info-label">Publisher ID</span>
      <span class="info-value agent">${c.publisher_id}</span>
    </div>` : ''}
    ${c.caller_id ? `
    <div class="info-row">
      <span class="info-label">Caller ID</span>
      <span class="info-value caller">${c.caller_id}</span>
    </div>` : ''}
    <div class="info-row">
      <span class="info-label">Turns</span>
      <span class="info-value">${c.total_turns}</span>
    </div>
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="info-value" style="color:var(--green)">${c.status}</span>
    </div>
  `;
}

function renderSpeakerStats() {
  const c = callData;
  const agentTurns  = c.segments.filter(s=>s.role==='agent').length;
  const callerTurns = c.segments.filter(s=>s.role==='caller').length;
  const totalWords  = c.agent_word_count + c.caller_word_count;
  const agentPct    = totalWords ? Math.round(100 * c.agent_word_count / totalWords) : 50;
  const callerPct   = 100 - agentPct;

  document.getElementById('agent-stat').textContent  =
    `${c.agent_word_count.toLocaleString()} words · ${agentTurns} turns`;
  document.getElementById('caller-stat').textContent =
    `${c.caller_word_count.toLocaleString()} words · ${callerTurns} turns`;
  document.getElementById('ratio-agent').style.width  = agentPct  + '%';
  document.getElementById('ratio-caller').style.width = callerPct + '%';
  document.getElementById('ratio-agent-pct').textContent  = agentPct  + '%';
  document.getElementById('ratio-caller-pct').textContent = callerPct + '%';
}

function renderTranscript(highlight = '') {
  const segs = callData?.segments || [];
  const inner = document.getElementById('transcript-wrap').querySelector('.transcript-inner') ||
    (() => { const d=document.createElement('div'); d.className='transcript-inner'; document.getElementById('transcript-wrap').appendChild(d); return d; })();

  if (!segs.length) {
    inner.innerHTML = `
      <div class="error-banner">
        ${callData.status === 'error'
          ? `❌ Processing failed: ${callData.error_msg || 'Unknown error'}`
          : '⏳ Transcription in progress...'}
      </div>`;
    return;
  }

  let html = '';

  // IVR auto-greeting detection (very short first segment with no clear speaker)
  // We just render all segments normally
  segs.forEach((seg, i) => {
    const ts = formatTime(seg.start_sec);
    const tsEnd = formatTime(seg.end_sec);
    let text = seg.text;
    if (highlight) {
      const re = new RegExp(`(${escapeRe(highlight)})`, 'gi');
      text = text.replace(re, '<mark>$1</mark>');
    }
    html += `
    <div class="seg-group" id="seg-${i}" data-idx="${i}"
      data-start="${seg.start_sec}" data-role="${seg.role}"
      onclick="seekTo(${seg.start_sec})">
      <div class="seg-avatar ${seg.role}">
        ${seg.role === 'agent' ? 'AG' : 'CA'}
      </div>
      <div class="seg-body">
        <div class="seg-header">
          <span class="seg-role ${seg.role}">${seg.role === 'agent' ? 'Agent' : 'Caller'}</span>
          <span class="seg-time">${ts} → ${tsEnd}</span>
        </div>
        <div class="seg-text">${text}</div>
      </div>
    </div>`;
  });

  inner.innerHTML = `<div style="display:flex;flex-direction:column;">${html}</div>`;
}

// ── HIGHLIGHT ACTIVE SEGMENT ──────────────────────────────────────────────

function highlightActiveSegment(currentTime) {
  const segs = callData?.segments || [];
  let newIdx = -1;
  for (let i = segs.length - 1; i >= 0; i--) {
    if (currentTime >= segs[i].start_sec) { newIdx = i; break; }
  }
  if (newIdx === activeSegIdx) return;
  if (activeSegIdx >= 0) {
    document.getElementById(`seg-${activeSegIdx}`)?.classList.remove('active');
  }
  if (newIdx >= 0) {
    const el = document.getElementById(`seg-${newIdx}`);
    el?.classList.add('active');
    el?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  activeSegIdx = newIdx;
}

// ── SEARCH ────────────────────────────────────────────────────────────────

function escapeRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function doSearch(q) {
  const trimmed = q.trim();
  if (!trimmed) {
    renderTranscript('');
    document.getElementById('search-count').textContent = '';
    return;
  }
  const re = new RegExp(escapeRe(trimmed), 'gi');
  const matches = (callData?.segments || []).filter(s => re.test(s.text));
  renderTranscript(trimmed);
  document.getElementById('search-count').textContent =
    matches.length ? `${matches.length} match${matches.length!==1?'es':''}` : 'No matches';
}

// ── DOWNLOAD ──────────────────────────────────────────────────────────────

async function downloadTxt() {
  try {
    const res = await fetch(`${API}/api/calls/${callId}/export/txt`, { headers: headers() });
    if (!res.ok) throw new Error('Download failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${(callData?.filename||callId).split('.')[0]}_transcript.txt`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    alert('Download failed: ' + e.message);
  }
}

function copyTranscript() {
  const segs = callData?.segments || [];
  const text = segs.map(s =>
    `${s.role === 'agent' ? 'Agent' : 'Caller'} [${formatTime(s.start_sec)}]: ${s.text}`
  ).join('\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('[onclick="copyTranscript()"]');
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────

// Initialize transcript inner div
document.getElementById('transcript-wrap').innerHTML =
  '<div class="transcript-inner"><div class="loading-wrap"><div class="spinner"></div><span>Loading transcript...</span></div></div>';

loadCall();
</script>
