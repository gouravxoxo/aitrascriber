<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceIQ — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07090F;
    --surface:   #0D1117;
    --card:      #161B27;
    --border:    #1E2535;
    --border2:   #2A3347;
    --agent:     #4F8EF7;
    --agent-dim: #1E3461;
    --caller:    #F5A623;
    --caller-dim:#3D2A08;
    --green:     #22C55E;
    --red:       #EF4444;
    --text:      #E8ECF4;
    --muted:     #6B7A99;
    --muted2:    #4A5568;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }

  /* animated grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { from { background-position: 0 0; } to { background-position: 40px 40px; } }

  /* glow orbs */
  .orb {
    position: fixed; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none;
  }
  .orb-1 { width: 500px; height: 500px; background: rgba(79,142,247,0.07); top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(245,166,35,0.05); bottom: -100px; right: -100px; }

  .login-wrap {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .login-card {
    width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 40px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,142,247,0.08);
    animation: fadeUp 0.6s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex; align-items: center; gap: 10px; margin-bottom: 36px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--agent), #2563EB);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--agent); }

  h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 6px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 32px;
  }

  .tabs {
    display: flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1; padding: 8px 12px;
    background: none; border: none;
    color: var(--muted); font-family: inherit; font-size: 13px;
    cursor: pointer; border-radius: 6px; transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .form-group { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }
  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--agent);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
  }
  input::placeholder { color: var(--muted2); }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--agent), #2563EB);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 7px;
    padding: 10px 13px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 18px;
    display: none;
  }
  .error-msg.show { display: block; }

  .form-panel { display: none; }
  .form-panel.active { display: block; }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">🎙</div>
      <div class="logo-text">Voice<span>IQ</span></div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your transcription workspace</p>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <div id="error-box" class="error-msg"></div>

    <!-- Login -->
    <div id="login-panel" class="form-panel active">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In →</button>
    </div>

    <!-- Register -->
    <div id="register-panel" class="form-panel">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="your_username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters">
      </div>
      <button class="btn-primary" id="reg-btn" onclick="doRegister()">Create Account →</button>
    </div>
  </div>
</div>

<script>
const API = window.API_BASE || '';

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', (tab==='login'?0:1)===i));
  document.getElementById('login-panel').classList.toggle('active', tab==='login');
  document.getElementById('register-panel').classList.toggle('active', tab==='register');
  hideError();
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg; el.classList.add('show');
}
function hideError() {
  document.getElementById('error-box').classList.remove('show');
}

async function doLogin() {
  hideError();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { showError('Please fill all fields'); btn.disabled=false; btn.textContent='Sign In →'; return; }
  try {
    const form = new URLSearchParams({ username, password });
    const res = await fetch(`${API}/api/auth/login`, { method:'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    localStorage.setItem('voiceiq_token', data.access_token);
    window.location.href = '/dashboard.html';
  } catch(e) {
    showError(e.message);
  } finally { btn.disabled=false; btn.textContent='Sign In →'; }
}

async function doRegister() {
  hideError();
  const btn = document.getElementById('reg-btn');
  btn.disabled=true; btn.textContent='Creating account...';
  const username = document.getElementById('reg-username').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username||!email||!password) { showError('Please fill all fields'); btn.disabled=false; btn.textContent='Create Account →'; return; }
  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');
    showError(''); switchTab('login');
    document.getElementById('login-username').value = username;
  } catch(e) { showError(e.message); }
  finally { btn.disabled=false; btn.textContent='Create Account →'; }
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('login-panel').classList.contains('active')) doLogin();
    else doRegister();
  }
});

// Redirect if already logged in
if (localStorage.getItem('voiceiq_token')) window.location.href = '/dashboard.html';
</script>
</body>
</html>
